<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百工 Baigong — Agent 系统控制台</title>
<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#232734;--border:#2a2e3a;--text:#e2e8f0;--text-dim:#7c8294;--amber:#f59e0b;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--purple:#8b5cf6;--pink:#ec4899;--radius:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-l h1{font-size:16px;font-weight:700}
.hdr-l h1 span{font-weight:300;color:var(--text-dim);font-size:12px;margin-left:4px}
.hdr-tag{font-size:11px;color:var(--text-dim);border-left:1px solid var(--border);padding-left:10px}
.input-area{display:flex;align-items:center;gap:8px;padding:8px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.input-area input{flex:1;min-width:200px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;transition:.15s}
.input-area input:focus{border-color:var(--amber)}
.input-area input::placeholder{color:var(--text-dim)}
.btn{padding:6px 14px;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn-pri{background:var(--amber);color:#1a1d27}
.btn-pri:hover{background:#d48a08}
.btn-pri:disabled{opacity:.4;cursor:not-allowed}
.btn-stop{background:var(--red);color:#fff}
.btn-stop:hover{background:#dc2626}
.stbar{padding:6px 20px;font-size:12px;color:var(--text-dim);background:var(--bg2);border-bottom:1px solid var(--border)}
.grid{display:grid;grid-template-columns:200px 1fr 260px;gap:8px;padding:8px;height:calc(100vh - 150px);overflow:hidden}
.pn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
.pn-h{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid var(--border);flex-shrink:0;font-size:12px;font-weight:600}
.bdg{background:var(--bg3);padding:1px 6px;border-radius:8px;font-size:10px;color:var(--text-dim)}
.pn-agents .pn-h{color:var(--amber);font-size:11px}
.ag{display:flex;gap:6px;padding:5px;margin:2px 5px;background:var(--bg3);border-radius:4px;border:1px solid transparent;transition:.15s}
.ag.working{border-color:var(--blue);background:rgba(59,130,246,.04)}
.ag.done{border-color:var(--green);background:rgba(16,185,129,.04)}
.ag.waiting{border-color:var(--amber);background:rgba(245,158,11,.04)}
.ag-av{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;border:1.5px solid var(--border);position:relative;flex-shrink:0}
.ag-d{position:absolute;bottom:-1px;right:-1px;width:7px;height:7px;border-radius:50%;border:1px solid var(--bg3)}
.ag-d.busy{background:var(--blue);animation:pulse .8s infinite}
.ag-d.ok{background:var(--green)}.ag-d.idle{background:var(--text-dim)}.ag-d.wait{background:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ag-b{flex:1;min-width:0}.ag-n{font-size:12px;font-weight:600}.ag-r{font-size:10px;color:var(--text-dim)}
.ag-a{font-size:11px;color:var(--blue);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-s{display:flex;gap:5px;margin-top:1px;font-size:10px;color:var(--text-dim)}
.pn-board .pn-h{color:var(--blue);font-size:11px}
.bc{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:5px;flex:1;overflow:hidden}
.col{display:flex;flex-direction:column;background:var(--bg3);border-radius:4px;overflow:hidden}
.col-h{padding:4px 5px;font-size:10px;font-weight:600;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.col.pp .col-h{color:var(--text-dim)}.col.ip .col-h{color:var(--blue)}.col.dn .col-h{color:var(--green)}
.col-b{flex:1;overflow-y:auto;padding:3px;display:flex;flex-direction:column;gap:2px}
.cd{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:4px 5px;font-size:10px}
.cd.ip{border-color:var(--blue)}.cd.dn{border-color:var(--green);opacity:.8}
.cd-g{font-weight:500}.cd-a{font-size:9px;color:var(--text-dim);margin-top:1px}.cd-r{font-size:9px;color:var(--green);margin-top:1px}
.cd-p{height:2px;background:var(--bg);border-radius:1px;margin-top:2px;overflow:hidden}.cd-p>div{height:100%;background:var(--blue);transition:width .3s}
.emp{font-size:10px;color:var(--text-dim);text-align:center;padding:10px}
.pn-rt{display:flex;flex-direction:column;gap:6px;overflow:hidden}
.pn-log{flex:1;overflow:hidden}.pn-log .pn-h{color:var(--green);font-size:11px}
.lb{flex:1;overflow-y:auto;padding:3px 6px;font-family:"SF Mono","Menlo",monospace;font-size:10px}
.l{display:flex;gap:3px;padding:1px 2px;border-radius:2px;animation:fade .2s}.l:hover{background:var(--bg3)}
.l-t{color:var(--text-dim);flex-shrink:0}.l-a{flex-shrink:0;font-weight:500}.l-m{flex:1}
.l.action .l-m{color:var(--blue)}.l.result .l-m{color:var(--green)}.l.thought .l-m{color:var(--amber);font-style:italic}
.l.memory .l-m{color:var(--purple)}.l.skill .l-m{color:#f97316}
@keyframes fade{from{opacity:0;transform:translateY(-2px)}to{opacity:1;transform:translateY(0)}}
.pn-mem{flex:0 0 auto;max-height:150px;overflow:hidden}
.pn-mem .pn-h{color:var(--purple);font-size:11px}
.mb{padding:3px 5px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.mn{background:var(--bg3);border-radius:3px;padding:3px 5px;border-left:2px solid var(--purple);font-size:10px}
.mh{display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim)}
.mp{color:var(--green);font-weight:600}.mc{font-size:11px;font-weight:600;margin-top:1px}.ms{font-size:9px;color:var(--text-dim)}
.pn-sk{flex:0 0 auto;max-height:70px;overflow:hidden}.pn-sk .pn-h{color:#f97316;font-size:11px}
.sb{padding:3px 5px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:2px}
.st{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.25);color:#f97316;padding:2px 5px;border-radius:3px;font-size:9px;font-weight:500}
.pn-ms{flex:0 0 auto;max-height:80px;overflow:hidden}.pn-ms .pn-h{color:var(--pink);font-size:11px}
.msb{padding:2px 5px;overflow-y:auto}.msl{font-size:9px;padding:1px 2px;color:var(--text-dim);animation:fade .2s}.msl b{color:var(--text)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-l">
    <h1>🏮 百工 <span>Baigong</span></h1>
    <span class="hdr-tag">多 Agent 协作系统</span>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="btn btn-pri" id="btnStart">▶ 启动系统</button>
    <button class="btn btn-stop" id="btnStop" style="display:none">⏹ 停止</button>
  </div>
</div>
<div class="input-area">
  <input id="taskInput" type="text" placeholder="输入任务，例如：收集 10 篇翡翠鉴别资料并入库" autofocus disabled>
  <button class="btn btn-pri" id="btnSubmit" disabled>📤 下发任务</button>
</div>
<div class="stbar" id="statusBar">先点击「启动系统」初始化百工 Agent 集群</div>
<div class="grid">
  <section class="pn pn-agents">
    <div class="pn-h"><span>👥 Agent 注册表</span><span class="bdg" id="ac">等待启动...</span></div>
    <div id="al"></div>
  </section>
  <section class="pn pn-board">
    <div class="pn-h"><span>📋 任务看板</span><span class="bdg" id="tc">0</span></div>
    <div class="bc">
      <div class="col pp"><div class="col-h">待处理</div><div class="col-b" id="cp"></div></div>
      <div class="col ip"><div class="col-h">进行中</div><div class="col-b" id="ci"></div></div>
      <div class="col dn"><div class="col-h">已完成</div><div class="col-b" id="cd"></div></div>
    </div>
  </section>
  <section class="pn-rt">
    <div class="pn pn-log"><div class="pn-h"><span>📜 思考-行动日志</span></div><div class="lb" id="ll"></div></div>
    <div class="pn pn-mem"><div class="pn-h"><span>🧠 长期记忆</span></div><div class="mb" id="ml"></div></div>
    <div class="pn pn-sk"><div class="pn-h"><span>🎯 Skill</span></div><div class="sb" id="sl"></div></div>
    <div class="pn pn-ms"><div class="pn-h"><span>📨 消息总线</span></div><div class="msb" id="msgl"></div></div>
  </section>
</div>
<script>
const $=id=>document.getElementById(id);
let es=null, timer=null;

// ── API 调用 ──
async function api(path,opts={}){
  const r=await fetch(path,{headers:{'Content-Type':'application/json'},...opts});
  return r.json();
}

// ── 启动 ──
$('btnStart').onclick=async function(){
  this.disabled=true;
  $('statusBar').innerHTML='⏳ 初始化百工系统...';
  const r=await api('/api/start',{method:'POST'});
  if(!r.ok){
    $('statusBar').innerHTML='❌ 启动失败: '+(r.error||'未知错误');
    this.disabled=false;
    return;
  }
  $('btnStart').style.display='none';
  $('btnStop').style.display='inline-block';
  $('taskInput').disabled=false;
  $('btnSubmit').disabled=false;
  $('statusBar').innerHTML='✅ 系统已启动！输入任务下发';
  $('ac').textContent='5 人';
  connectSSE();
};

// ── 停止 ──
$('btnStop').onclick=async function(){
  await api('/api/stop',{method:'POST'});
  $('btnStart').disabled=false;
  $('btnStart').style.display='inline-block';
  this.style.display='none';
  $('taskInput').disabled=true;
  $('btnSubmit').disabled=true;
  $('statusBar').innerHTML='⏹ 系统已停止';
  if(es){es.close();es=null}
};

// ── 下发任务 ──
$('btnSubmit').onclick=async function(){
  const text=$('taskInput').value.trim();
  if(!text)return;
  $('btnSubmit').disabled=true;
  $('statusBar').innerHTML=`⚙️ 下发任务: "${text}"`;
  const r=await api('/api/task',{method:'POST',body:JSON.stringify({goal:text})});
  if(r.ok){
    $('statusBar').innerHTML=`⚙️ 任务已下发，Agent 开始处理: "${text}"`;
    $('taskInput').value='';
  }else{
    $('statusBar').innerHTML='❌ 下发失败: '+(r.error||'');
  }
  setTimeout(()=>{$('btnSubmit').disabled=false},1000);
};
$('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('btnSubmit').click()});

// ── SSE 实时数据 ──
function connectSSE(){
  if(es)es.close();
  es=new EventSource('/api/events');
  es.onmessage=function(e){
    try{
      const state=JSON.parse(e.data);
      render(state);
    }catch(err){}
  };
  es.onerror=function(){};
  // 立即获取一次初始状态
  fetchState();
}
async function fetchState(){
  const state=await api('/api/state');
  if(state)render(state);
}

// ── 渲染 ──
function render(state){
  if(!state)return;
  renderAgents(state);
  renderBoard(state);
  renderLog(state);
  renderMemory(state);
  renderSkills(state);
  renderMessages(state);
}
function renderAgents(state){
  if(!state.agents||!state.agents.length){
    $('al').innerHTML='<div style="text-align:center;padding:20px;color:var(--text-dim)">系统未启动</div>';
    return;
  }
  $('al').innerHTML=state.agents.map(a=>{
    const sd=a.status==='working'?'busy':a.status==='done'?'ok':a.status==='waiting'?'wait':'idle';
    const color=a.color||'#6b7280';
    return `<div class="ag ${a.status}"><div class="ag-av" style="background:${color}15;border-color:${color}">${a.icon||'🤖'}<span class="ag-d ${sd}"></span></div><div class="ag-b"><div class="ag-n">${a.name}</div><div class="ag-r">${a.role}</div><div class="ag-a">${a.action||'空闲'}</div><div class="ag-s"><span>🔧${a.tool_calls||0}</span><span>✅${a.tasks_done||0}</span><span>🧠${a.memory_nodes||0}</span></div></div></div>`;
  }).join('');
  $('ac').textContent=state.agents.length+' 人';
}
function renderBoard(state){
  $('tc').textContent=(state.tasks||[]).length;
  const p=[],ip=[],dn=[];
  (state.tasks||[]).forEach(t=>{
    const h=`<div class="cd ${t.status}"><div class="cd-g">${t.goal}</div>${t.assignee?`<div class="cd-a">👤${t.assignee}</div>`:''}${t.result?`<div class="cd-r">${t.result}</div>`:''}${t.progress>0?`<div class="cd-p"><div style="width:${t.progress*100}%"></div></div>`:''}</div>`;
    if(t.status==='pending')p.push(h);else if(t.status==='in_progress')ip.push(h);else dn.push(h);
  });
  $('cp').innerHTML=p.join('')||'<div class="emp">—</div>';
  $('ci').innerHTML=ip.join('')||'<div class="emp">—</div>';
  $('cd').innerHTML=dn.join('')||'<div class="emp">—</div>';
}
function renderLog(state){
  const el=$('ll');
  const logs=state.logs||[];
  if(!logs.length){el.innerHTML='<div style="text-align:center;padding:12px;color:var(--text-dim)">等待事件...</div>';return}
  el.innerHTML=logs.map(l=>`<div class="l ${l.type||''}"><span class="l-t">${l.t||''}</span><span class="l-a">${l.icon||''} ${l.a||''}</span><span class="l-m">${l.msg}</span></div>`).join('');
  el.scrollTop=el.scrollHeight;
}
function renderMemory(state){
  const el=$('ml');
  const mems=state.memories||[];
  if(!mems.length){el.innerHTML='<div style="font-size:10px;color:var(--text-dim);text-align:center;padding:6px">等待记忆巩固...</div>';return}
  el.innerHTML=mems.map(m=>`<div class="mn"><div class="mh"><span>${m.icon||''} ${m.agent||''}</span><span class="mp">${m.pct||0}%</span></div><div class="mc">${m.concept||''}</div><div class="ms">${m.summary||''}</div></div>`).join('');
}
function renderSkills(state){
  const el=$('sl');
  const skills=state.skills||[];
  el.innerHTML=skills.length?skills.map(s=>`<span class="st">🎯 ${s.name||''}</span>`).join(''):'<div style="font-size:10px;color:var(--text-dim);text-align:center;padding:6px">等待...</div>';
}
function renderMessages(state){
  const el=$('msgl');
  const msgs=state.messages||[];
  if(!msgs.length){el.innerHTML='';return}
  el.innerHTML=msgs.map(m=>`<div class="msl"><b>${m.from||''}</b> → ${m.to||''}: ${m.text||''}</div>`).join('');
  el.scrollTop=el.scrollHeight;
}
</script>
</body>
</html>
