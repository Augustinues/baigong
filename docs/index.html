<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百工 Baigong — 在线 Demo</title>
<style>
/* ═══════════ 变量 ═══════════ */
:root {
  --bg: #0f1117; --bg2: #1a1d27; --bg3: #232734;
  --border: #2a2e3a; --text: #e2e8f0; --text-dim: #7c8294;
  --accent: #f59e0b; --accent2: #3b82f6; --green: #10b981;
  --red: #ef4444; --purple: #8b5cf6; --radius: 8px;
  --bg2a: rgba(26,29,39,0.95);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent2);text-decoration:none}

/* ═══════════ 顶部 ═══════════ */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.logo{font-size:20px;font-weight:700}
.logo span{font-weight:300;color:var(--text-dim);font-size:13px;margin-left:4px}

.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{padding:6px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary{background:var(--accent);color:#1a1d27}
.btn-primary:hover{background:#d48a08}
.btn-stop{background:var(--red);color:#fff}
.btn-stop:hover{background:#dc2626}

.speed-group{display:flex;align-items:center;gap:2px;background:var(--bg3);border-radius:6px;padding:2px}
.speed-group span{font-size:11px;color:var(--text-dim);padding:0 6px}
.speed-btn{background:transparent;border:none;color:var(--text-dim);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;transition:.15s}
.speed-btn:hover{color:var(--text);background:var(--bg)}
.speed-btn.on{color:var(--accent);background:rgba(245,158,11,.12);font-weight:600}

.status-bar{padding:8px 20px;font-size:12px;color:var(--text-dim);background:var(--bg2);border-bottom:1px solid var(--border)}

/* ═══════════ 仪表板 ═══════════ */
.grid{display:grid;grid-template-columns:260px 1fr 300px;gap:10px;padding:10px;height:calc(100vh - 100px);overflow:hidden}

/* 面板通用 */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-hdr h2{font-size:13px;font-weight:600}
.badge{background:var(--bg3);padding:1px 7px;border-radius:10px;font-size:11px;color:var(--text-dim)}

/* ── 左栏: Agent ── */
.panel-agents{overflow-y:auto}
.agent-card{display:flex;gap:8px;padding:8px;margin:4px 8px;background:var(--bg3);border-radius:var(--radius);border:1px solid transparent;transition:.2s}
.agent-card.work{border-color:var(--accent2);background:rgba(59,130,246,.06)}
.agent-card.done{border-color:var(--green);background:rgba(16,185,129,.06)}
.agent-card.wait{border-color:var(--accent);background:rgba(245,158,11,.06)}
.agent-card.err{border-color:var(--red);background:rgba(239,68,68,.06)}
.agent-avatar{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid var(--border);position:relative;flex-shrink:0}
.dot{position:absolute;bottom:-2px;right:-2px;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg3)}
.dot.on{background:var(--accent2);animation:pulse .8s infinite}
.dot.idle{background:var(--text-dim)}
.dot.done{background:var(--green)}
.dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.agent-body{flex:1;min-width:0}
.agent-name{font-size:13px;font-weight:600}
.agent-role{font-size:11px;color:var(--text-dim)}
.agent-act{font-size:11px;color:var(--accent2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-stats{display:flex;gap:8px;margin-top:2px;font-size:10px;color:var(--text-dim)}

/* ── 中栏: 看板 ── */
.panel-board{overflow:hidden}
.board-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:8px;flex:1;overflow:hidden}
.col{display:flex;flex-direction:column;background:var(--bg3);border-radius:6px;overflow:hidden}
.col-hdr{padding:6px 8px;font-size:12px;font-weight:600;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.col-pend .col-hdr{color:var(--text-dim)}
.col-prog .col-hdr{color:var(--accent2)}
.col-done .col-hdr{color:var(--green)}
.col-body{flex:1;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:6px 8px;font-size:12px}
.card.inprog{border-color:var(--accent2)}
.card.done{border-color:var(--green);opacity:.8}
.card-goal{font-weight:500;line-height:1.3}
.card-assign{font-size:11px;color:var(--text-dim);margin-top:2px}
.card-result{font-size:11px;color:var(--green);margin-top:2px}
.card-bar{height:3px;background:var(--bg);border-radius:2px;margin-top:4px;overflow:hidden}
.card-bar>div{height:100%;background:var(--accent2);border-radius:2px;transition:width .3s}
.empty-card{font-size:12px;color:var(--text-dim);text-align:center;padding:16px 0}

/* ── 右栏 ── */
.panel-side{display:flex;flex-direction:column;gap:10px;overflow:hidden}
.panel-log{flex:1;overflow:hidden}
.panel-memory{flex:0 0 auto;max-height:180px;overflow:hidden}
.panel-skills{flex:0 0 auto;max-height:120px;overflow:hidden}

.log-body{flex:1;overflow-y:auto;padding:4px 8px}
.log-body pre{margin:0;white-space:pre-wrap;word-break:break-all}
.log-line{display:flex;gap:5px;font-size:11px;padding:2px 4px;border-radius:3px;animation:fade .2s}
.log-line:hover{background:var(--bg3)}
.log-t{color:var(--text-dim);flex-shrink:0;font-variant-numeric:tabular-nums}
.log-a{color:var(--text);font-weight:500;flex-shrink:0}
.log-msg{color:var(--text);flex:1}
.log-line.action .log-msg{color:var(--accent2)}
.log-line.result .log-msg{color:var(--green)}
.log-line.thought .log-msg{color:var(--accent);font-style:italic}
.log-line.memory .log-msg{color:var(--purple)}
.log-line.skill .log-msg{color:#f97316}
.log-line.error .log-msg{color:var(--red)}
@keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}

/* 记忆 */
.mem-body{padding:6px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.mem-empty{font-size:12px;color:var(--text-dim);text-align:center;padding:8px}
.mem-node{background:var(--bg3);border-radius:5px;padding:6px 8px;border-left:3px solid var(--purple);animation:fade .3s}
.mem-hdr{display:flex;justify-content:space-between;font-size:11px}
.mem-ag{color:var(--text-dim)}
.mem-pct{color:var(--green);font-weight:600}
.mem-con{font-size:13px;font-weight:600;margin-top:1px}
.mem-sum{font-size:11px;color:var(--text-dim)}

/* 技能 */
.skill-body{padding:6px 8px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:4px}
.skill-empty{font-size:12px;color:var(--text-dim);text-align:center;padding:8px;width:100%}
.skill-tag{background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.3);color:#f97316;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}

/* 消息流 */
.panel-msg{flex:0 0 auto;max-height:100px;overflow:hidden}
.msg-body{padding:4px 8px;overflow-y:auto}
.msg-line{font-size:11px;padding:2px 4px;color:var(--text-dim);animation:fade .2s}
.msg-line b{color:var(--text)}

/* 滚动条 */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 响应式 */
@media(max-width:900px){
  .grid{grid-template-columns:1fr;grid-template-rows:auto 1fr auto;height:auto}
}
</style>
</head>
<body>

<!-- ═══ 顶部 ═══ -->
<header class="topbar">
  <div class="logo">🏮 百工 <span>Baigong</span></div>
  <div class="controls">
    <div class="speed-group">
      <span>速度</span>
      <button class="speed-btn" data-v=".5">½×</button>
      <button class="speed-btn on" data-v="1">1×</button>
      <button class="speed-btn" data-v="2">2×</button>
      <button class="speed-btn" data-v="5">5×</button>
      <button class="speed-btn" data-v="10">10×</button>
    </div>
    <button class="btn btn-primary" id="btnStart">▶ 开始演示</button>
    <button class="btn btn-stop" id="btnStop" style="display:none">⏹ 停止</button>
  </div>
</header>
<div class="status-bar" id="statusBar">点击「开始演示」观看百工协作流程</div>

<!-- ═══ 仪表板 ═══ -->
<main class="grid">
  <!-- 左栏: Agent -->
  <section class="panel panel-agents">
    <div class="panel-hdr"><h2>👥 工匠工位</h2><span class="badge" id="agentCount">0</span></div>
    <div id="agentList"></div>
  </section>

  <!-- 中栏: 看板 -->
  <section class="panel panel-board">
    <div class="panel-hdr"><h2>📋 任务看板</h2><span class="badge" id="taskCount">0</span></div>
    <div class="board-cols">
      <div class="col col-pend">
        <div class="col-hdr">📥 待处理</div>
        <div class="col-body" id="colPending"></div>
      </div>
      <div class="col col-prog">
        <div class="col-hdr">🔄 进行中</div>
        <div class="col-body" id="colProgress"></div>
      </div>
      <div class="col col-done">
        <div class="col-hdr">✅ 已完成</div>
        <div class="col-body" id="colDone"></div>
      </div>
    </div>
  </section>

  <!-- 右栏 -->
  <section class="panel-side">
    <div class="panel panel-log">
      <div class="panel-hdr"><h2>📜 协作日志</h2></div>
      <div class="log-body" id="logList"></div>
    </div>
    <div class="panel panel-memory">
      <div class="panel-hdr"><h2>🧠 记忆树</h2></div>
      <div class="mem-body" id="memList"></div>
    </div>
    <div class="panel panel-skills">
      <div class="panel-hdr"><h2>🎯 技能</h2></div>
      <div class="skill-body" id="skillList"></div>
    </div>
    <div class="panel panel-msg">
      <div class="panel-hdr"><h2>📨 消息流</h2></div>
      <div class="msg-body" id="msgList"></div>
    </div>
  </section>
</main>

<script>
// ═══════════════════════════════════
// 百工在线模拟器 — 完整 JavaScript
// ═══════════════════════════════════

const S = {
  running: false, speed: 1, step: 0, finished: false,
  agents: [], tasks: [], logs: [], memories: [], skills: [], messages: [],
  _timer: null, _scenario: null
};

// ── 初始化 Agent ──
function init() {
  S.agents = [
    {id:'manager',name:'张经理',role:'主管', icon:'👔',color:'#f59e0b',status:'idle',action:'',tools:0,tasks:0,mems:0,msg:0},
    {id:'researcher',name:'王研究员',role:'研究员',icon:'🔍',color:'#3b82f6',status:'idle',action:'',tools:0,tasks:0,mems:0,msg:0},
    {id:'editor',name:'李编辑',role:'编辑',icon:'✏️',color:'#10b981',status:'idle',action:'',tools:0,tasks:0,mems:0,msg:0},
    {id:'admin',name:'陈管理员',role:'管理员',icon:'📚',color:'#8b5cf6',status:'idle',action:'',tools:0,tasks:0,mems:0,msg:0},
    {id:'qa',name:'赵质检',role:'质检',icon:'✅',color:'#ef4444',status:'idle',action:'',tools:0,tasks:0,mems:0,msg:0},
  ];
  S.tasks=[]; S.logs=[]; S.memories=[]; S.skills=[]; S.messages=[];
  S.step=0; S.finished=false;
}

// ── 工具函数 ──
function log(id, text, type='action'){
  const a=S.agents.find(x=>x.id===id);
  const t=new Date().toLocaleTimeString('zh-CN',{hour12:false});
  S.logs.push({t,a:a?.name||'',i:a?.icon||'•',msg:text,type});
  if(S.logs.length>300) S.logs.splice(0,50);
}
function msg(from, to, text){
  S.messages.push({from,to,text});
  if(S.messages.length>50) S.messages.shift();
}
function task(goal,status='pending',assignee='',parent=''){
  const id='t'+Date.now().toString(36);
  S.tasks.push({id,goal,status,assignee,progress:0,result:'',parent});
  return id;
}
function updTask(id,obj){const t=S.tasks.find(x=>x.id===id);if(t)Object.assign(t,obj)}
function memory(agentId,concept,summary,pct){
  const a=S.agents.find(x=>x.id===agentId);
  S.memories.push({agent:a?.name||'',icon:a?.icon||'',concept,summary,pct});
  if(S.memories.length>15) S.memories.shift();
}
function skill(name,desc){
  if(!S.skills.find(x=>x.name===name)) S.skills.push({name,desc});
}
function setAct(id,action,status='working'){
  const a=S.agents.find(x=>x.id===id); if(!a)return;
  a.action=action; a.status=status;
}

function waitt(sec){
  return new Promise(r=>setTimeout(r,sec*1000/S.speed));
}

// ═══════════════════════════════════
// 场景：完整百工演示
// ═══════════════════════════════════
async function scene() {
  const s=waitt;

  log('manager','🏮 百工启动 — 5 位工匠就位','thought');
  msg('系统','全部','百工系统初始化完成');

  await s(1);

  // ── CEO 下任务 ──
  const rootTask = task('收集 10 篇翡翠鉴别资料并入库','in_progress','manager');
  setAct('manager','分析任务');
  log('manager','📋 CEO 下发任务：收集 10 篇翡翠鉴别资料并入库','action');
  msg('CEO','manager','新任务：收集翡翠鉴别资料');
  await s(1.2);

  // ── 主管拆解 ──
  log('manager','拆解任务 — 3 个子任务','thought');
  setAct('manager','拆解中...');
  log('manager','① 搜索翡翠资料 → 王研究员','action');
  log('manager','② 整理去重 → 李编辑','action');
  log('manager','③ 入库 → 陈管理员','action');
  await s(1);
  updTask(rootTask,{progress:.1});

  const t1=task('搜索翡翠鉴别资料 5 篇','in_progress','researcher',rootTask);
  const t2=task('整理去重分类','pending','editor',rootTask);
  const t3=task('写入知识库','pending','admin',rootTask);
  msg('manager','researcher','子任务：搜索翡翠资料');
  msg('manager','editor','子任务：整理资料');
  msg('manager','admin','子任务：入库');

  // ── 研究员搜索 ──
  await s(.8);
  setAct('manager','等待中','waiting');
  setAct('researcher','搜索中...','working');
  log('researcher','领取任务：搜索翡翠鉴别资料','action');
  msg('researcher','manager','已领取任务，开始搜索');

  await s(1);
  log('researcher','🔧 web_search("翡翠鉴别 A货 B货")','action');
  S.agents.find(x=>x.id==='researcher').tools++;
  await s(.8);
  log('researcher','找到 5 条结果 — 百度百科、知乎、小红书','result');
  log('researcher','🔧 web_search("翡翠真假鉴别方法")','action');
  S.agents.find(x=>x.id==='researcher').tools++;
  await s(.8);
  log('researcher','找到 7 条结果，2 条与前面重复','result');

  // 记忆
  log('researcher','💭 发现百度百科质量最高，记住这个策略','memory');
  memory('researcher','翡翠搜索策略','百度百科+关键词"鉴别 A货 B货"效果最好',70);
  msg('researcher','manager','搜索完成，找到 10 篇不重复资料');
  await s(1);
  log('researcher','✅ 搜索完成 — 10 篇已写入看板','result');
  updTask(t1,{status:'done',result:'10 篇已搜索'});
  updTask(rootTask,{progress:.35});
  setAct('researcher','✅ 完成','done');
  S.agents.find(x=>x.id==='researcher').tasks++;

  // ── 编辑整理 ──
  await s(.6);
  setAct('editor','整理中...','working');
  log('editor','读取看板 → 开始整理','action');
  msg('editor','manager','开始整理资料');
  await s(1);
  log('editor','去重完成：10 → 8 篇（2 篇内容重复）','result');
  log('editor','分类：科普 3 篇 | 鉴定方法 3 篇 | 市场行情 2 篇','result');
  await s(1);
  log('editor','✅ 整理完成 — 8 篇已标准化格式','result');
  updTask(t2,{status:'done',result:'8 篇已整理分类'});
  updTask(rootTask,{progress:.6});
  setAct('editor','✅ 完成','done');
  S.agents.find(x=>x.id==='editor').tasks++;
  msg('editor','manager','整理完毕，8 篇已分类');

  // ── 知识库管理员入库 ──
  await s(.6);
  setAct('admin','入库中...','working');
  log('admin','开始写入知识库','action');
  msg('admin','manager','开始入库');
  await s(.8);
  log('admin','🔧 kb_write("翡翠鉴别方法汇总")','action');
  S.agents.find(x=>x.id==='admin').tools++;
  await s(1);
  log('admin','✅ 已写入 — 8 篇共 3420 字','result');
  log('admin','🔧 kb_write("翡翠市场行情分析")','action');
  S.agents.find(x=>x.id==='admin').tools++;
  await s(.6);
  log('admin','✅ 已写入 — 2 篇共 1580 字','result');
  updTask(t3,{status:'done',result:'资料已入库'});
  updTask(rootTask,{progress:.85});
  setAct('admin','✅ 完成','done');
  S.agents.find(x=>x.id==='admin').tasks++;
  msg('admin','manager','入库完成');

  // ── 质检复核 ──
  await s(.5);
  setAct('qa','质检中...','working');
  log('qa','复核入库内容质量','action');
  await s(.8);
  log('qa','抽查完成 — 内容合格，无格式问题','result');
  setAct('qa','✅ 通过','done');
  S.agents.find(x=>x.id==='qa').tasks++;
  msg('qa','manager','质检通过，内容合格');

  // ── 主管收尾 ──
  await s(.6);
  setAct('manager','汇总中...','working');
  log('manager','所有子任务完成，汇总报告','thought');
  await s(1);
  log('manager','📊 10 篇 → 整理 8 篇 → 入库 2 篇 → 全部通过质检','result');

  // 技能挖掘
  log('manager','🎯 技能挖掘：检测到"搜索"类任务 3+ 次','skill');
  skill('翡翠搜索','自动执行翡翠关键词搜索 + 百度百科优先',);
  skill('知识整理','去重 → 分类 → 标准化格式，置信度 0.6');
  msg('系统','全部','技能系统检测到新模式，已自动形成 Skill');

  // 更多记忆
  await s(.5);
  log('researcher','📤 导出 "翡翠" 知识子树 — 6 个节点','memory');
  memory('researcher','翡翠知识树','根节点下挂搜索经验、来源评估、分类体系',80);
  S.agents.find(x=>x.id==='researcher').mems++;

  // 消息统计
  msg('manager','CEO','🎉 任务完成！8 篇翡翠资料已入库知识库');
  await s(.5);
  updTask(rootTask,{status:'done',progress:1,result:'全部完成 ✅'});
  setAct('manager','🎉 全部完成','done');
  S.agents.find(x=>x.id==='manager').tasks++;
  log('manager','🎉 百工协作完成！','result');
  S.finished=true;
}

// ═══════════════════════════════════
// 渲染
// ═══════════════════════════════════
function render() {
  renderAgents();
  renderBoard();
  renderLog();
  renderMemory();
  renderSkills();
  renderMessages();
  renderStatus();
}

function renderAgents(){
  const el=document.getElementById('agentList');
  document.getElementById('agentCount').textContent=S.agents.length;
  el.innerHTML=S.agents.map(a=>`
    <div class="agent-card ${a.status}">
      <div class="agent-avatar" style="background:${a.color}22;border-color:${a.color}">${a.icon}<span class="dot ${a.status}"></span></div>
      <div class="agent-body">
        <div class="agent-name">${a.name}</div>
        <div class="agent-role">${a.role}</div>
        <div class="agent-act">${a.action||'待命中'}</div>
        <div class="agent-stats">
          <span>🔧${a.tools}</span><span>✅${a.tasks}</span><span>🧠${a.mems}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function renderBoard(){
  const p=document.getElementById('colPending');
  const ip=document.getElementById('colProgress');
  const d=document.getElementById('colDone');
  document.getElementById('taskCount').textContent=S.tasks.length;
  const [a,b,c]=[[],[],[]];
  S.tasks.forEach(t=>{
    const h=`<div class="card ${t.status}">
      <div class="card-goal">${t.goal}</div>
      ${t.assignee?`<div class="card-assign">👤${t.assignee}</div>`:''}
      ${t.result?`<div class="card-result">${t.result}</div>`:''}
      ${t.progress>0?`<div class="card-bar"><div style="width:${t.progress*100}%"></div></div>`:''}
    </div>`;
    if(t.status==='pending'||t.status==='')a.push(h);
    else if(t.status==='in_progress')b.push(h);
    else if(t.status==='done')c.push(h);
    else if(t.status==='complete')c.push(h);
    else a.push(h);
  });
  p.innerHTML=a.join('')||'<div class="empty-card">暂无任务</div>';
  ip.innerHTML=b.join('')||'<div class="empty-card">暂无任务</div>';
  d.innerHTML=c.join('')||'<div class="empty-card">暂无任务</div>';
}

function renderLog(){
  const el=document.getElementById('logList');
  if(!S.logs.length){el.innerHTML='<div class="mem-empty">等待事件...</div>';return}
  el.innerHTML=S.logs.slice(-60).map(l=>`
    <div class="log-line ${l.type}">
      <span class="log-t">${l.t||''}</span>
      <span class="log-a">${l.i||''} ${l.a||''}</span>
      <span class="log-msg">${l.msg}</span>
    </div>
  `).join('');
  el.scrollTop=el.scrollHeight;
}

function renderMemory(){
  const el=document.getElementById('memList');
  if(!S.memories.length){el.innerHTML='<div class="mem-empty">等待 Agent 积累经验...</div>';return}
  el.innerHTML=S.memories.slice().reverse().map(m=>`
    <div class="mem-node">
      <div class="mem-hdr">
        <span class="mem-ag">${m.icon||''} ${m.agent}</span>
        <span class="mem-pct">${m.pct}%</span>
      </div>
      <div class="mem-con">${m.concept}</div>
      <div class="mem-sum">${m.summary}</div>
    </div>
  `).join('');
}

function renderSkills(){
  const el=document.getElementById('skillList');
  if(!S.skills.length){el.innerHTML='<div class="skill-empty">等待技能形成...</div>';return}
  el.innerHTML=S.skills.map(s=>`<span class="skill-tag">🎯 ${s.name}</span>`).join('');
}

function renderMessages(){
  const el=document.getElementById('msgList');
  if(!S.messages.length){el.innerHTML='<div class="mem-empty"></div>';return}
  el.innerHTML=S.messages.slice(-20).map(m=>
    `<div class="msg-line"><b>${m.from}</b> → ${m.to}: ${m.text}</div>`
  ).join('');
  el.scrollTop=el.scrollHeight;
}

function renderStatus(){
  const bar=document.getElementById('statusBar');
  if(S.finished){
    bar.innerHTML='🎉 百工协作完成！所有任务已交付 👉 <a href="https://github.com/Augustinues/baigong" target="_blank">GitHub 仓库</a>';
  }else if(S.running){
    const done=S.tasks.filter(t=>t.status==='done').length;
    bar.innerHTML=`⚙️ 运行中 · 步骤 ${S.step} · 任务 ${done}/${S.tasks.length}`;
  }
}

// ═══════════════════════════════════
// 控制
// ═══════════════════════════════════
document.getElementById('btnStart').onclick=async function(){
  if(S.running)return;
  init();
  S.running=true;
  document.getElementById('btnStart').style.display='none';
  document.getElementById('btnStop').style.display='inline-block';

  render();

  // 启动场景
  S._scenario = scene();

  // 每秒渲染
  S._timer = setInterval(render, 200);

  await S._scenario;
  clearInterval(S._timer);
  render();
};

document.getElementById('btnStop').onclick=function(){
  S.running=false;
  clearInterval(S._timer);
  init(); render();
  document.getElementById('btnStart').style.display='inline-block';
  document.getElementById('btnStop').style.display='none';
  document.getElementById('statusBar').innerHTML='⏹ 演示已停止';
};

// 速度控制
document.querySelectorAll('.speed-btn').forEach(b=>{
  b.onclick=function(){
    document.querySelectorAll('.speed-btn').forEach(x=>x.classList.remove('on'));
    this.classList.add('on');
    S.speed=parseFloat(this.dataset.v);
  };
});

// 首次渲染
init();
render();
</script>
</body>
</html>
