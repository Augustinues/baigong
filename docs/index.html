<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百工 Baigong — Agent 工厂</title>
<style>
/* ═══ 完整 UI 主题系统 ═══ */
[data-theme="amber"]{--bg:#0f1117;--bg2:#1a1d27;--bg3:#232734;--border:#2a2e3a;--text:#e2e8f0;--dim:#7c8294;--accent:#f59e0b;--accent2:#f97316}
[data-theme="jade"]{--bg:#0c1713;--bg2:#14231e;--bg3:#1b2d27;--border:#213a32;--text:#d1fae5;--dim:#6b9e86;--accent:#10b981;--accent2:#059669}
[data-theme="indigo"]{--bg:#0f1423;--bg2:#181f36;--bg3:#1e2742;--border:#25304f;--text:#dbeafe;--dim:#7c8fc7;--accent:#6366f1;--accent2:#4f46e5}
[data-theme="twilight"]{--bg:#170f23;--bg2:#231b30;--bg3:#2d233d;--border:#382d49;--text:#e9dff5;--dim:#9a8bb3;--accent:#a855f7;--accent2:#9333ea}
[data-theme="daylight"]{--bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--dim:#64748b;--accent:#f59e0b;--accent2:#d97706}
[data-theme="rose"]{--bg:#1f1014;--bg2:#2c181c;--bg3:#381f24;--border:#46282e;--text:#fce7f3;--dim:#b0798e;--accent:#ec4899;--accent2:#db2777}
[data-theme="midnight"]{--bg:#06080e;--bg2:#0d0f16;--bg3:#13151e;--border:#1a1d28;--text:#c8ccd6;--dim:#555a68;--accent:#38bdf8;--accent2:#0ea5e9}
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#232734;--border:#2a2e3a;--text:#e2e8f0;--dim:#7c8294;--accent:#f59e0b;--accent2:#f97316;--green:#10b981;--red:#ef4444;--purple:#8b5cf6}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
*{margin:0;padding:0;box-sizing:border-box}
.hdr{display:flex;align-items:center;padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--border);gap:10px;flex-shrink:0}
.hdr h1{font-size:15px;font-weight:700;white-space:nowrap}.hdr h1 span{font-weight:300;color:var(--dim);font-size:11px}
#sysStat{font-size:11px;color:var(--dim);min-width:60px}
.hdr-center{display:flex;align-items:center;gap:6px}
.btn{padding:4px 10px;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.btn-pri{background:var(--accent);color:var(--bg)}.btn-pri:hover{filter:brightness(1.1)}.btn-pri:disabled{filter:saturate(.4);opacity:.5;cursor:not-allowed}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{filter:brightness(1.2)}
.btn-ok{background:var(--green);color:#fff}.btn-ok:hover{filter:brightness(1.2)}
.btn-sm{padding:2px 7px;font-size:10px}
.task-bar{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.task-bar input{flex:1;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;outline:none}
.task-bar input:focus{border-color:var(--accent)}
.task-bar input::placeholder{color:var(--dim)}
.theme-picker{display:flex;gap:3px;margin-left:auto}
.theme-dot{width:15px;height:15px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.2s}
.theme-dot.act{border-color:var(--text)}.theme-dot:hover{transform:scale(1.25)}
.hdr-actions{display:flex;align-items:center;gap:3px}
.hdr-actions .btn{background:var(--bg3);color:var(--dim);padding:2px 6px}.hdr-actions .btn:hover{color:var(--text)}
.main{display:flex;flex:1;overflow:hidden;gap:1px;background:var(--border)}
.col{display:flex;flex-direction:column;overflow:hidden}
.col-left{width:240px;flex-shrink:0;background:var(--bg2)}
.col-center{flex:1;background:var(--bg2)}
.col-right{width:300px;flex-shrink:0;background:var(--bg2)}
.col-h{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;font-size:11px;font-weight:600;border-bottom:1px solid var(--border);flex-shrink:0}
.col-h .cnt{font-size:10px;color:var(--dim);font-weight:400}
.col-h .badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-size:9px;font-weight:600;padding:0 5px}
.badge-pending{background:rgba(245,158,11,.15);color:var(--accent)}
.badge-working{background:rgba(59,130,246,.15);color:var(--accent2)}
.badge-done{background:rgba(16,185,129,.15);color:var(--green)}
/* ── Agent List ── */
.ag-list{flex:1;overflow-y:auto;padding:4px}
.ag-card{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:5px;cursor:pointer;transition:.1s;border:1px solid transparent;margin-bottom:1px}
.ag-card:hover{background:var(--bg3)}
.ag-card.sel{border-color:var(--accent);background:rgba(var(--accent-rgb,245,158,11),.08)}
.ag-av-wrap{position:relative;flex-shrink:0}
.ag-av{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--bg3)}
.dot{position:absolute;bottom:-1px;right:-1px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--bg2)}
.dot-idle{background:var(--dim)}.dot-thinking{background:var(--accent);animation:pulse .8s infinite}.dot-acting{background:var(--accent2);animation:pulse .8s infinite}.dot-done{background:var(--green)}.dot-error{background:var(--red)}
.ag-info{flex:1;min-width:0}.ag-name{font-size:12px;font-weight:600}
.ag-role2{font-size:9px;color:var(--dim)}.ag-action{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* ── New Agent Btn ── */
.btn-new-agent{display:flex;align-items:center;justify-content:center;gap:4px;width:100%;padding:6px;margin:4px;background:var(--bg3);border:1px dashed var(--border);border-radius:5px;color:var(--dim);font-size:11px;cursor:pointer;transition:.15s}
.btn-new-agent:hover{border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb,245,158,11),.05)}
/* ── Center: Tabs ── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{padding:7px 14px;font-size:11px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--dim);transition:.15s}
.tab:hover{color:var(--text)}.tab.act{border-bottom-color:var(--accent);color:var(--accent)}
/* ── Kanban ── */
.kanban{display:flex;flex:1;overflow:hidden;gap:8px;padding:8px}
.kanban-col{flex:1;display:flex;flex-direction:column;background:var(--bg3);border-radius:6px;overflow:hidden}
.kanban-h{padding:7px 10px;font-size:11px;font-weight:600;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kanban-body{flex:1;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:4px}
.kanban-empty{padding:20px;text-align:center;color:var(--dim);font-size:11px}
/* Task Card */
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:7px 8px;transition:.15s;cursor:default}
.task-card:hover{border-color:var(--accent)}
.task-card.status-pending{border-left:3px solid var(--accent)}
.task-card.status-in_progress{border-left:3px solid var(--accent2);background:rgba(59,130,246,.04)}
.task-card.status-done,.task-card.status-completed{border-left:3px solid var(--green);opacity:.8}
.task-card.status-failed{border-left:3px solid var(--red)}.task-card.status-stuck{border-left:3px solid var(--red)}
.tc-goal{font-size:11px;font-weight:500;line-height:1.4}
.tc-assign{font-size:10px;color:var(--dim);margin-top:3px}
.tc-assign strong{color:var(--accent);font-weight:600}
.tc-result{font-size:10px;color:var(--green);margin-top:2px;line-height:1.3}
.tc-bar{height:2px;background:var(--bg);border-radius:2px;margin-top:4px;overflow:hidden}
.tc-fill{height:100%;background:var(--accent2);border-radius:2px;transition:width .3s}
/* ── Agent Workflow Status ── */
.wf-bar{display:flex;gap:3px;padding:5px 8px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.wf-step{display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:3px;font-size:10px;background:var(--bg3);color:var(--dim)}
.wf-step.act{background:rgba(var(--accent2-rgb,59,130,246),.1);color:var(--accent2)}
.wf-step.done{background:rgba(16,185,129,.1);color:var(--green)}
/* ── Edit Form ── */
.center-scroll{flex:1;overflow-y:auto;padding:10px}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:5px;margin-bottom:10px}
.ov-card{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px;text-align:center}
.ov-val{font-size:18px;font-weight:700;color:var(--accent)}
.ov-lbl{font-size:10px;color:var(--dim);margin-top:1px}
.edit-s{margin-bottom:12px}.edit-s h3{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.fg{margin-bottom:6px}.fg label{display:block;font-size:10px;font-weight:600;margin-bottom:2px}
.fg input,.fg select,.fg textarea{width:100%;padding:5px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 1px rgba(var(--accent-rgb,245,158,11),.15)}
.fg textarea{min-height:36px;resize:vertical}.fg-hint{font-size:9px;color:var(--dim);margin-top:1px}
.tool-grid{display:flex;flex-wrap:wrap;gap:3px}
.tool-chk{display:flex;align-items:center;gap:3px;padding:2px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;cursor:pointer;font-size:10px;transition:.1s}
.tool-chk input{display:none}
.tool-chk.chk{border-color:var(--accent);background:rgba(var(--accent-rgb,245,158,11),.1);color:var(--accent)}
.edit-acts{display:flex;gap:6px;justify-content:flex-end;padding-top:5px;border-top:1px solid var(--border);margin-top:4px}
/* ── Right: Logs ── */
.log-box{flex:1;overflow-y:auto;padding:3px 6px;font-family:"SF Mono","Menlo",monospace;font-size:10px}
.l{display:flex;gap:3px;padding:1px 3px;border-radius:2px;line-height:1.5}.l:hover{background:var(--bg3)}
.l-t{color:var(--dim);flex-shrink:0}
.l-m{flex:1}.l.act .l-m{color:var(--accent2)}.l.res .l-m{color:var(--green)}.l.thk .l-m{color:var(--accent);font-style:italic}.l.mem .l-m{color:var(--purple)}.l.err .l-m{color:var(--red)}
/* Modal */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;align-items:center;justify-content:center}
.modal.act{display:flex}
.modal-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5)}
.modal-c{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:420px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600}
.modal-close{cursor:pointer;color:var(--dim);padding:2px 6px;border-radius:3px;font-size:14px}.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-b{padding:14px}
.up-info{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.up-label{color:var(--dim)}.up-val{font-weight:600}
.up-status{margin:8px 0;font-size:11px;padding:6px;background:var(--bg3);border-radius:4px;min-height:18px;color:var(--dim);white-space:pre-wrap}
.up-acts{display:flex;gap:6px;margin-top:6px}
.up-preview{font-size:10px;color:var(--dim);margin-top:6px;max-height:80px;overflow-y:auto;padding:4px;white-space:pre-wrap;background:var(--bg);border-radius:4px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}::-webkit-scrollbar-thumb:hover{background:var(--dim)}
</style>
</head>
<body>
<div class="hdr">
  <h1>🏮 百工 <span>Baigong</span></h1>
  <span id="sysStat">⏳ 加载中...</span>
  <div class="hdr-center">
    <button class="btn btn-pri" id="btnStart">▶ 启动</button>
    <button class="btn btn-red" id="btnStop" style="display:none">⏹ 停止</button>
  </div>
  <div class="theme-picker" id="themePicker"></div>
  <div class="hdr-actions">
    <span class="cnt" id="taskBadge" style="font-size:10px;color:var(--dim);margin-right:4px"></span>
    <button class="btn" onclick="showUpdate()" title="版本与更新">⚙️</button>
  </div>
</div>
<div class="task-bar">
  <input id="taskInput" placeholder="给 Agent 下发任务... 例如：收集10篇翡翠鉴别资料并入库" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitTask()}">
  <button class="btn btn-pri btn-sm" onclick="submitTask()">📤 下发</button>
  <select id="taskAgent" style="padding:4px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;outline:none">
    <option value="">自动分配</option>
  </select>
</div>

<div class="main">
  <div class="col col-left">
    <div class="col-h"><span>🤖 Agent</span><span class="cnt" id="agCnt">0</span></div>
    <div class="ag-list" id="agList"></div>
    <button class="btn-new-agent" id="btnNewAgent" onclick="showNewAgent()">+ 新建 Agent</button>
  </div>
  <div class="col col-center">
    <div class="tab-bar" id="tabBar">
      <div class="tab act" onclick="showTab('kanban',this)">📋 任务看板</div>
      <div class="tab" id="tabEdit" style="display:none" onclick="showTab('edit',this)">✏️ 编辑 Agent</div>
    </div>
    <div id="kanbanView" class="flex-col" style="display:flex;flex:1;overflow:hidden;flex-direction:column">
      <div class="wf-bar" id="wfBar"></div>
      <div class="kanban" id="kanbanArea"></div>
    </div>
    <div id="editView" style="display:none;flex:1;overflow:hidden;flex-direction:column">
      <div class="center-scroll" id="editContent"></div>
    </div>
  </div>
  <div class="col col-right">
    <div class="col-h"><span>📜 日志</span><span class="cnt" id="logCnt">0</span></div>
    <div class="log-box" id="logBox"><div style="padding:20px;text-align:center;color:var(--dim)">等待系统启动...</div></div>
  </div>
</div>

<!-- New Agent Modal -->
<div class="modal" id="newAgentModal">
  <div class="modal-bg" onclick="hideNewAgent()"></div>
  <div class="modal-c">
    <div class="modal-h">🆕 新建 Agent <span class="modal-close" onclick="hideNewAgent()">✕</span></div>
    <div class="modal-b">
      <div class="fg"><label>名字</label><input id="naName" placeholder="例如：王研究员"></div>
      <div class="fg"><label>角色描述</label><input id="naRole" placeholder="例如：研究员、编辑、管理员"></div>
      <div class="fg"><label>System Prompt</label><textarea id="naPrompt" rows="3" placeholder="定义 Agent 的人格和行为规则..."></textarea></div>
      <div class="fg"><label>LLM 提供商</label>
        <select id="naProvider"><option value="">使用全局</option></select></div>
      <div class="fg"><label>模型</label>
        <select id="naModel"><option value="">使用全局</option></select></div>
      <div class="fg"><label>工具</label>
        <div class="tool-grid" id="naTools"></div></div>
      <div class="edit-acts">
        <button class="btn btn-ok" onclick="createAgent()">✅ 创建</button>
      </div>
    </div>
  </div>
</div>

<!-- Update Modal -->
<div class="modal" id="updateModal">
  <div class="modal-bg" onclick="hideUpdate()"></div>
  <div class="modal-c">
    <div class="modal-h">🔄 版本与更新 <span class="modal-close" onclick="hideUpdate()">✕</span></div>
    <div class="modal-b">
      <div class="up-info"><span class="up-label">当前版本</span><span class="up-val" id="upCurrent">-</span></div>
      <div class="up-info"><span class="up-label">最新版本</span><span class="up-val" id="upLatest">-</span></div>
      <div class="up-info"><span class="up-label">运行模式</span><span class="up-val" id="upMode">-</span></div>
      <div class="up-status" id="upStatus"></div>
      <div class="up-acts">
        <button class="btn btn-sm btn-ok" onclick="checkUpdate()">🔍 检查更新</button>
        <button class="btn btn-sm btn-pri" id="upBtnDownload" style="display:none" onclick="applyUpdate()">⬇️ 下载更新</button>
      </div>
      <div class="up-preview" id="upPreview"></div>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);

const FULL_THEMES={
  amber:{name:'琥珀',dot:'#f59e0b'},jade:{name:'翡翠',dot:'#10b981'},indigo:{name:'靛蓝',dot:'#6366f1'},
  twilight:{name:'暮紫',dot:'#a855f7'},daylight:{name:'白昼',dot:'#f59e0b'},rose:{name:'玫瑰',dot:'#ec4899'},
  midnight:{name:'极夜',dot:'#38bdf8'}
};
const THEME_NAMES=Object.keys(FULL_THEMES);
let es=null,state={agents:[],logs:[],tasks:[]},selectedAgent=null,providers={};
let currentTab='kanban',editingAgentId=null;

async function api(path,o={}){
  const r=await fetch(path,{headers:{'Content-Type':'application/json'},...o});
  return r.json();
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Theme
function initTheme(){
  const cur=localStorage.getItem('baigong_theme')||'amber';
  $('themePicker').innerHTML=THEME_NAMES.map(n=>`<div class="theme-dot ${n===cur?'act':''}" data-theme="${n}" style="background:${FULL_THEMES[n].dot}" onclick="setTheme('${n}')" title="${FULL_THEMES[n].name}"></div>`).join('');
  applyTheme(cur);
}
function setTheme(n){
  localStorage.setItem('baigong_theme',n);applyTheme(n);
  document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('act',d.dataset.theme===n));
  api('/api/theme',{method:'POST',body:JSON.stringify({accent:n})}).catch(()=>{});
}
function applyTheme(n){
  document.documentElement.setAttribute('data-theme',n);
  const t=n;const root=document.documentElement;
  // The CSS has the values, we just need to set the attribute
  root.setAttribute('data-theme',n);
}

// Init
async function init(){
  initTheme();
  providers=await api('/api/providers')||{};
  const cfg=await api('/api/config');
  if(cfg&&cfg.llm&&cfg.llm.api_key){
    $('sysStat').textContent='已配置';
  } else {
    $('sysStat').textContent='⚠️ 未配置 API Key';
  }
  // Populate new agent modal providers
  const pk=Object.keys(providers);
  const sel=$('naProvider');
  sel.innerHTML='<option value="">使用全局</option>'+pk.map(k=>`<option value="${k}">${k}</option>`).join('');
  setInterval(fetchState,3000);await fetchState();
}

// Start/Stop
$('btnStart').onclick=async function(){
  this.disabled=true;$('sysStat').textContent='⏳ 启动中...';
  const r=await api('/api/start',{method:'POST'});
  if(r.ok){
    this.style.display='none';$('btnStop').style.display='inline-block';$('sysStat').textContent='✅ 运行中';
    connectSSE();await fetchState();
  } else {$('sysStat').textContent='❌ '+(r.error||'失败');this.disabled=false}
};
$('btnStop').onclick=async function(){
  await api('/api/stop',{method:'POST'});
  this.style.display='none';$('btnStart').style.display='inline-block';$('btnStart').disabled=false;
  $('sysStat').textContent='⏹ 已停止';if(es){es.close();es=null}
};

// SSE + Poll
function connectSSE(){if(es)es.close();es=new EventSource('/api/events');es.onmessage=function(e){try{const d=JSON.parse(e.data);if(d)render(d)}catch(e){}};es.onerror=function(){};fetchState()}
async function fetchState(){const s=await api('/api/state');if(s&&s.agents)render(s)}

// Render
function render(s){
  state=s;renderAgents(s);renderLogs(s);renderKanban(s);updateWfBar(s);
  const taskBadge=s.tasks?`📋 ${s.tasks.length} 任务`:'';
  $('taskBadge').textContent=taskBadge;
  // Update edit view if editing
  if(editingAgentId&&s.agents){
    const a=s.agents.find(x=>x.id===editingAgentId);
    if(a){selectedAgent=a;if(currentTab==='edit')renderEditForm(a)}
  }
}
function renderAgents(s){
  const a=s.agents||[];$('agCnt').textContent=a.length;
  $('agList').innerHTML=a.length?a.map(x=>{
    const sel=selectedAgent&&selectedAgent.id===x.id?'sel':'';
    return `<div class="ag-card ${sel}" onclick="selectAgent('${x.id}')">
      <div class="ag-av-wrap"><div class="ag-av">🤖</div><span class="dot dot-${x.status||'idle'}"></span></div>
      <div class="ag-info"><div class="ag-name">${esc(x.name)}</div><div class="ag-role2">${esc(x.role||'')}</div><div class="ag-action">${x.action||'等待任务...'}</div></div>
    </div>`;
  }).join(''):'<div style="text-align:center;padding:20px;color:var(--dim);font-size:11px">暂无 Agent<br><span style="font-size:9px">点击下方 + 新建</span></div>';
  // Task agent dropdown
  const sel=$('taskAgent');const idle=a.filter(x=>x.status==='idle'||x.status==='done');
  sel.innerHTML='<option value="">自动分配</option>'+idle.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');
}
function renderLogs(s){
  const l=s.logs||[];$('logCnt').textContent=l.length;
  const el=$('logBox');if(!l.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--dim)">等待系统启动...</div>';return}
  el.innerHTML=l.slice(-200).map(x=>{const tp=(x.type||'');return `<div class="l ${tp}"><span class="l-t">${esc(x.t||'')}</span><span class="l-m">${esc(x.msg||'')}</span></div>`}).join('');
  el.scrollTop=el.scrollHeight;
}

// ── Kanban Board ──
const KANBAN_COLS={
  pending:{title:'待处理',badge:'pending',states:['pending']},
  progress:{title:'进行中',badge:'working',states:['in_progress','assigned']},
  done:{title:'已完成',badge:'done',states:['completed','done','failed','stuck','cancelled']}
};
function renderKanban(s){
  const tasks=s.tasks||[];const kanban=$('kanbanArea');
  const colsHtml=Object.values(KANBAN_COLS).map(col=>{
    const items=tasks.filter(t=>col.states.includes(t.status)||(!t.status&&col.states[0]==='pending'));
    return `<div class="kanban-col">
      <div class="kanban-h"><span>${col.title}</span><span class="badge badge-${col.badge}">${items.length}</span></div>
      <div class="kanban-body">${
        items.length?items.map(t=>renderTaskCard(t)).join(''):`<div class="kanban-empty">暂无任务</div>`
      }</div>
    </div>`;
  }).join('');
  kanban.innerHTML=colsHtml;
}
function renderTaskCard(t){
  const s=t.status||'pending';
  const progress=t.progress?Math.round(t.progress*100):0;
  return `<div class="task-card status-${s}">
    <div class="tc-goal">${esc(t.goal)}</div>
    ${t.assignee?`<div class="tc-assign">👤 <strong>${esc(t.assignee)}</strong></div>`:''}
    ${t.result?`<div class="tc-result">${esc(t.result).slice(0,80)}${(t.result||'').length>80?'...':''}</div>`:''}
    ${progress>0?`<div class="tc-bar"><div class="tc-fill" style="width:${progress}%"></div></div>`:''}
  </div>`;
}

// ── Workflow Status Bar ──
function updateWfBar(s){
  const a=s.agents||[];const el=$('wfBar');
  if(!a.length||!s.running){el.innerHTML='';return}
  // Show agent workflow: who's doing what
  el.innerHTML=a.map(x=>{
    const cls=x.status==='thinking'||x.status==='acting'?'act':(x.status==='done'?'done':'');
    const label=x.status==='thinking'?'🤔':(x.status==='acting'?'🔧':(x.status==='done'?'✅':'⏳'));
    const task=x.current_task?` ${esc(x.current_task).slice(0,20)}`:x.action?` ${esc(x.action).slice(0,20)}`:'';
    return `<span class="wf-step ${cls}">${esc(x.name)} ${label}${task}</span>`;
  }).join('');
}

// ── Tab System ──
function showTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  if(el)el.classList.add('act');
  if(tab==='kanban'){
    $('kanbanView').style.display='flex';$('editView').style.display='none';
    renderKanban(state);editingAgentId=null;
  } else if(tab==='edit'){
    $('kanbanView').style.display='none';$('editView').style.display='flex';
    if(selectedAgent)renderEditForm(selectedAgent);
  }
}

// ── Select Agent → Edit ──
async function selectAgent(id){
  try{
    const a=await api('/api/agents/'+id);
    if(a&&a.id){selectedAgent=a;editingAgentId=a.id}
  }catch(e){const a=(state.agents||[]).find(x=>x.id===id);if(a){selectedAgent=a;editingAgentId=a.id}}
  // Switch to edit tab
  const editTab=document.getElementById('tabEdit');
  editTab.style.display='block';editTab.textContent='✏️ '+esc(selectedAgent.name);
  showTab('edit',editTab);
  renderEditForm(selectedAgent);
}

// ── Edit Form ──
function renderEditForm(a){
  const tools=a.tools||[];
  const allTools=Object.keys((state.tools||{})).length?Object.keys(state.tools||{}):['web_search','web_extract','file_read','file_write','code_exec'];
  const pks=Object.keys(providers);
  $('editContent').innerHTML=`
    <div class="edit-s"><h3>📋 基本信息</h3>
      <div class="fg"><label>名字</label><input id="eName" value="${esc(a.name)}"></div>
      <div class="fg"><label>角色描述</label><input id="eRole" value="${esc(a.role||'')}" placeholder="例如：研究员、编辑、管理员"></div></div>
    <div class="edit-s"><h3>🧠 人设 / System Prompt</h3>
      <div class="fg"><textarea id="ePrompt" rows="4" placeholder="定义 Agent 的人格、行为规则...">${esc(a.system_prompt||'')}</textarea></div></div>
    <div class="edit-s"><h3>🔌 LLM 配置</h3>
      <div class="fg"><label>提供商</label>
        <select id="eProvider" onchange="onProvChange()">
          <option value="">使用全局</option>
          ${pks.map(k=>`<option value="${k}" ${a.provider===k?'selected':''}>${k}</option>`).join('')}
        </select></div>
      <div class="fg"><label>模型</label>
        <select id="eModel"><option value="">使用全局</option>${
          a.provider&&providers[a.provider]?(providers[a.provider].models||[]).map(m=>`<option value="${m}" ${a.model===m?'selected':''}>${m}</option>`).join(''):''
        }</select></div>
      <div class="fg"><label>API Key</label><input id="eApiKey" type="password" value="${esc(a.api_key||'')}" placeholder="留空用全局"></div>
      <div class="fg"><label>API 地址</label><input id="eBaseUrl" value="${esc(a.base_url||'')}" placeholder="留空用默认"></div></div>
    <div class="edit-s"><h3>🔧 工具（点击选中）</h3>
      <div class="tool-grid">${allTools.map(t=>`<label class="tool-chk ${tools.includes(t)?'chk':''}" onclick="this.classList.toggle('chk')"><input type="checkbox" ${tools.includes(t)?'checked':''} value="${t}"> ${t}</label>`).join('')}</div></div>
    <div class="edit-acts">
      <button class="btn btn-red" onclick="if(confirm('确定删除这个 Agent？'))deleteAgent('${a.id}')">🗑 删除</button>
      <button class="btn btn-pri" onclick="saveAgent('${a.id}')">💾 保存更改</button>
    </div>`;
}
function onProvChange(){
  const p=$('eProvider').value;const sel=$('eModel');
  if(!p||!providers[p]){sel.innerHTML='<option value="">使用全局</option>';return}
  sel.innerHTML='<option value="">使用全局</option>'+providers[p].models.map(m=>`<option value="${m}">${m}</option>`).join('');
}
async function saveAgent(id){
  const body={};
  const n=$('eName').value.trim();if(n)body.name=n;
  const r=$('eRole').value.trim();if(r)body.role=r;
  const p=$('ePrompt').value.trim();if(p)body.system_prompt=p;
  body.tools=[];document.querySelectorAll('#editContent .tool-chk input:checked').forEach(cb=>body.tools.push(cb.value));
  body.provider=$('eProvider').value||null;body.model=$('eModel').value||null;
  body.api_key=$('eApiKey').value||null;body.base_url=$('eBaseUrl').value||null;
  $('sysStat').textContent='⏳ 保存中...';
  try{
    const res=await api('/api/agents/'+id,{method:'PATCH',body:JSON.stringify(body)});
    if(res.ok){$('sysStat').textContent='✅ 已保存';await fetchState();if(selectedAgent)selectAgent(selectedAgent.id)}
    else{$('sysStat').textContent='❌ 保存失败: '+(res.detail||res.error||'未知错误')}
  }catch(e){$('sysStat').textContent='❌ 保存失败: '+e.message}
}
async function deleteAgent(id){
  const res=await api('/api/agents/'+id,{method:'DELETE'});
  if(res.ok){
    selectedAgent=null;editingAgentId=null;
    document.getElementById('tabEdit').style.display='none';
    showTab('kanban',document.querySelector('.tab'));
    await fetchState();
  }
}

// ── New Agent ──
function showNewAgent(){
  $('newAgentModal').classList.add('act');
  $('naName').value='';$('naRole').value='';$('naPrompt').value='';
  $('naProvider').value='';
  $('naModel').innerHTML='<option value="">使用全局</option>';
  // Fill tools
  const allTools=Object.keys((state.tools||{})).length?Object.keys(state.tools||{}):['web_search','web_extract','file_read','file_write','code_exec'];
  $('naTools').innerHTML=allTools.map(t=>`<label class="tool-chk chk" onclick="this.classList.toggle('chk')"><input type="checkbox" checked value="${t}"> ${t}</label>`).join('');
}
function hideNewAgent(){$('newAgentModal').classList.remove('act')}
async function createAgent(){
  const name=$('naName').value.trim();if(!name){$('sysStat').textContent='❌ 请输入名字';return}
  const role=$('naRole').value.trim()||'worker';
  const prompt=$('naPrompt').value.trim();
  const tools=[];$('#naTools .tool-chk input:checked').forEach(cb=>tools.push(cb.value));
  const provider=$('naProvider').value||'';
  const model=$('naModel').value||'';
  $('sysStat').textContent='⏳ 创建中...';
  const res=await api('/api/agents',{method:'POST',body:JSON.stringify({
    name,role,tools,system_prompt:prompt,provider,model
  })});
  if(res.ok){
    $('sysStat').textContent='✅ Agent 已创建';
    hideNewAgent();
    await fetchState();
  } else {
    $('sysStat').textContent='❌ 创建失败: '+(res.error||'未知错误');
  }
}
// Provider change in new agent modal
$('naProvider').onchange=function(){
  const p=this.value;const sel=$('naModel');
  if(!p||!providers[p]){sel.innerHTML='<option value="">使用全局</option>';return}
  sel.innerHTML='<option value="">使用全局</option>'+providers[p].models.map(m=>`<option value="${m}">${m}</option>`).join('');
};

// ── Task ──
async function submitTask(){
  const goal=$('taskInput').value.trim();if(!goal)return;
  $('taskInput').value='';
  const agent=$('taskAgent').value;
  const res=await api('/api/task',{method:'POST',body:JSON.stringify({goal,agent_id:agent})});
  if(res.ok)$('sysStat').textContent='✅ 任务已下发';
  else $('sysStat').textContent='❌ '+(res.error||'失败');
}

// ── Update ──
function showUpdate(){$('updateModal').classList.add('act');api('/api/update/status').then(r=>{$('upCurrent').textContent='v'+r.version;$('upMode').textContent=r.mode||(r.frozen?'App打包版':'源码版')}).catch(()=>{})}
function hideUpdate(){$('updateModal').classList.remove('act')}
async function checkUpdate(){
  $('upStatus').textContent='⏳ 检查中...';$('upBtnDownload').style.display='none';$('upPreview').textContent='';
  try{const r=await api('/api/update/check');
    $('upCurrent').textContent='v'+r.current;$('upLatest').textContent='v'+r.latest;
    if(r.has_update){$('upBtnDownload').style.display='inline-block';$('upStatus').textContent='✅ 有新版本 v'+r.latest+' 可用！';$('upPreview').textContent=(r.body||'').slice(0,300)}
    else{$('upStatus').textContent=r.error?'⚠️ '+r.error:'✅ 已是最新版本'}
  }catch(e){$('upStatus').textContent='❌ 检查失败: '+e.message}
}
async function applyUpdate(){
  $('upBtnDownload').disabled=true;$('upStatus').textContent='⏳ 正在下载更新...';
  try{const r=await api('/api/update/apply',{method:'POST'});
    if(r.ok){$('upStatus').textContent=r.message;if(r.download_path)$('upPreview').textContent='下载完成，请关闭应用后打开 DMG 安装'}
    else{$('upStatus').textContent='❌ '+r.error;$('upBtnDownload').disabled=false}
  }catch(e){$('upStatus').textContent='❌ '+e.message;$('upBtnDownload').disabled=false}
}

init();
</script>
</body>
</html>
